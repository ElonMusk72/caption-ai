<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptionAI - AI Caption Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            resize: vertical;
        }
        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin: 15px 0;
            display: none;
            border-radius: 10px;
            background: #f5f5f5;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ CaptionAI ✨</h1>
        <div class="subtitle">AI-powered captions for your photos</div>

        <div class="input-group">
            <label>📸 Upload Your Image</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>💭 Optional Context (e.g., "Beach sunset with friends")</label>
            <textarea id="context" rows="2" placeholder="Describe your photo..."></textarea>
        </div>

        <img id="preview" alt="Preview">

        <button id="generateBtn">🚀 Generate Caption</button>

        <div id="loading" class="loading">🤖 AI is thinking...</div>
        <div id="output"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@google/generative-ai": "https://esm.run/@google/generative-ai"
            }
        }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Your API key (already inserted)
        const API_KEY = "AIzaSyAuLs0FZ7O65fzuvQbN_BdTb4dVHjC2yHw";
        
        const imageInput = document.getElementById('imageInput');
        const contextInput = document.getElementById('context');
        const preview = document.getElementById('preview');
        const generateBtn = document.getElementById('generateBtn');
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    preview.src = f.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        async function fileToGenerativePart(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve({
                        inlineData: {
                            data: base64,
                            mimeType: file.type
                        }
                    });
                };
                reader.readAsDataURL(file);
            });
        }

        generateBtn.addEventListener('click', async () => {
            const file = imageInput.files[0];
            const context = contextInput.value.trim();

            if (!file) {
                alert("Please upload an image first.");
                return;
            }

            try {
                generateBtn.disabled = true;
                loading.style.display = 'block';
                output.style.display = 'none';

                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const imagePart = await fileToGenerativePart(file);
                
                let prompt = "Write a creative, engaging caption for this image. Make it suitable for social media. Keep it concise but creative.";
                if (context) {
                    prompt = `Write a creative, engaging caption for this image. Context: ${context}. Make it suitable for social media. Keep it concise but creative.`;
                }

                const result = await model.generateContent([prompt, imagePart]);
                const response = await result.response;
                const caption = response.text();
                
                output.textContent = caption;
                output.style.display = 'block';
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                generateBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
